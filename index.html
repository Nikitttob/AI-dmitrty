<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ассистент ЖКХ + Право</title>
<style>
  :root {
    --bg: #0f1923; --bg2: #1a2634; --bg3: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.08); --text: #e0e6ed; --text2: #8899aa;
    --text3: #556677; --accent: #3b82f6; --accent2: #2563eb;
    --gold: #f59e0b; --green: #10b981; --red: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, #0d1b2a 100%);
    color: var(--text); height: 100vh; display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.03); backdrop-filter: blur(10px);
    flex-shrink: 0;
  }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .logo {
    width: 42px; height: 42px; border-radius: 11px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .header-title { font-size: 17px; font-weight: 600; color: #f0f4f8; }
  .header-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .status { display: inline-flex; align-items: center; gap: 4px; }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    display: inline-block; flex-shrink: 0;
  }
  .status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.offline { background: var(--gold); box-shadow: 0 0 6px var(--gold); }

  /* Tabs */
  .tabs { display: flex; gap: 6px; }
  .tab {
    flex: 1; padding: 8px 10px; border-radius: 8px; border: none;
    background: var(--bg3); color: var(--text2); cursor: pointer;
    font-size: 12px; font-weight: 400; transition: all 0.2s;
    font-family: inherit; text-align: center;
  }
  .tab:hover { background: rgba(255,255,255,0.1); }
  .tab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; font-weight: 600;
  }
  .tab small { display: block; font-size: 10px; opacity: 0.7; margin-top: 2px; }

  /* Chat Area */
  .chat { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 16px; }
  .chat::-webkit-scrollbar { width: 6px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  /* Welcome Screen */
  .welcome {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px; opacity: 0.7;
  }
  .welcome-icon { font-size: 52px; }
  .welcome-text { font-size: 14px; color: var(--text2); text-align: center; max-width: 380px; line-height: 1.6; }
  .examples { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 420px; }
  .example-btn {
    padding: 11px 14px; border-radius: 10px; border: 1px solid var(--border);
    background: rgba(255,255,255,0.04); color: #a0b0c0; cursor: pointer;
    font-size: 13px; text-align: left; transition: all 0.2s; font-family: inherit;
  }
  .example-btn:hover {
    background: rgba(59,130,246,0.12); border-color: rgba(59,130,246,0.3); color: #c0d0e0;
  }

  /* Messages */
  .msg { display: flex; }
  .msg.user { justify-content: flex-end; }
  .msg.assistant { justify-content: flex-start; }
  .msg-bubble {
    max-width: 85%; padding: 12px 16px; border-radius: 14px;
    font-size: 14px; line-height: 1.65; word-break: break-word;
  }
  .msg.user .msg-bubble {
    background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff;
  }
  .msg.assistant .msg-bubble {
    background: rgba(255,255,255,0.07); color: #d0d8e0;
  }
  .msg-bubble p { margin: 0.4em 0; }
  .msg-bubble strong { color: #f0f4f8; }
  .msg-bubble em { color: var(--text2); font-style: italic; }

  /* Sources */
  .sources-toggle {
    margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1);
  }
  .sources-btn {
    background: none; border: none; color: #60a5fa;
    cursor: pointer; font-size: 12px; padding: 0; font-family: inherit;
  }
  .sources-btn:hover { text-decoration: underline; }
  .sources-list { margin-top: 8px; }
  .source-item {
    padding: 6px 10px; margin-top: 4px; border-radius: 6px;
    background: rgba(0,0,0,0.2); font-size: 12px;
  }
  .source-item.legal { border-left: 3px solid var(--accent); }
  .source-item.banking { border-left: 3px solid var(--gold); }
  .source-q { font-weight: 500; color: #a0b0c0; }
  .source-r { color: #6b7b8b; margin-top: 2px; }

  /* Offline badge */
  .offline-badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    background: rgba(245,158,11,0.15); color: var(--gold);
    font-size: 11px; margin-top: 8px;
  }

  /* Loading */
  .loading-bubble {
    padding: 12px 20px; border-radius: 14px;
    background: rgba(255,255,255,0.07); color: var(--text2); font-size: 14px;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .loading-text { animation: pulse 1.5s infinite; }

  /* Input Area */
  .input-area {
    padding: 12px 20px 20px; border-top: 1px solid var(--border);
    background: rgba(255,255,255,0.02); flex-shrink: 0;
  }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  .input-field {
    flex: 1; padding: 12px 16px; border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    background: var(--bg3); color: var(--text);
    font-size: 14px; resize: none; outline: none;
    font-family: inherit; line-height: 1.5; max-height: 120px;
  }
  .input-field::placeholder { color: var(--text3); }
  .input-field:focus { border-color: rgba(59,130,246,0.5); }
  .send-btn {
    width: 44px; height: 44px; border-radius: 12px; border: none;
    background: var(--bg3); color: var(--text3);
    cursor: default; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0; font-family: inherit;
  }
  .send-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; cursor: pointer;
  }
  .send-btn.active:hover { transform: scale(1.05); }

  /* Questions Panel */
  .questions-panel {
    position: fixed; top: 0; right: -400px; width: 380px; height: 100vh;
    background: var(--bg2); border-left: 1px solid var(--border);
    z-index: 100; transition: right 0.3s; overflow-y: auto;
    padding: 20px;
  }
  .questions-panel.open { right: 0; }
  .questions-panel h3 { color: #f0f4f8; margin-bottom: 16px; font-size: 16px; }
  .q-item {
    padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
    background: var(--bg3); cursor: pointer; font-size: 13px;
    color: var(--text2); transition: all 0.2s; border: 1px solid transparent;
  }
  .q-item:hover { background: rgba(59,130,246,0.12); border-color: rgba(59,130,246,0.3); }
  .q-ref { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .overlay {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.5); z-index: 99; display: none;
  }
  .overlay.show { display: block; }
  .panel-close {
    float: right; background: none; border: none; color: var(--text2);
    font-size: 20px; cursor: pointer; padding: 4px; font-family: inherit;
  }
  .browse-btn {
    padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--text2); cursor: pointer;
    font-size: 12px; font-family: inherit; margin-left: auto; transition: all 0.2s;
  }
  .browse-btn:hover { background: rgba(59,130,246,0.12); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div class="logo">⚡</div>
    <div style="flex:1">
      <div class="header-title">Ассистент ЖКХ + Право</div>
      <div class="header-sub">
        <span class="status">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Загрузка...</span>
        </span>
        &nbsp;•&nbsp;
        <span id="statsText">...</span>
      </div>
    </div>
    <button class="browse-btn" onclick="togglePanel()">📋 База</button>
  </div>
  <div class="tabs">
    <button class="tab active" data-mode="all" onclick="setMode('all', this)">
      📚 Все разделы<small id="countAll">...</small>
    </button>
    <button class="tab" data-mode="l" onclick="setMode('l', this)">
      ⚖️ Право и ЖКХ<small id="countL">...</small>
    </button>
    <button class="tab" data-mode="b" onclick="setMode('b', this)">
      🏦 Банки и капремонт<small id="countB">...</small>
    </button>
  </div>
</div>

<!-- Chat -->
<div class="chat" id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🏠</div>
    <div class="welcome-text">
      Задайте вопрос по правовой системе РФ, ЖКХ или банковскому обслуживанию фондов капитального ремонта
    </div>
    <div class="examples" id="examples"></div>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <div class="input-row">
    <textarea class="input-field" id="input" rows="1"
      placeholder="Задайте вопрос..." 
      onkeydown="handleKey(event)"
      oninput="updateSendBtn()"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- Questions Panel -->
<div class="overlay" id="overlay" onclick="togglePanel()"></div>
<div class="questions-panel" id="questionsPanel">
  <button class="panel-close" onclick="togglePanel()">✕</button>
  <h3>📋 Вопросы в базе знаний</h3>
  <div id="questionsList"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════
let currentMode = "all";
let messages = [];
let isLoading = false;
let stats = null;
let panelOpen = false;

const EXAMPLES = {
  all: [
    "Чем спецсчёт отличается от счёта регоператора?",
    "Какие права есть у собственника жилого помещения?",
    "Как сменить управляющую компанию?"
  ],
  l: [
    "Как провести перерасчёт за некачественные услуги?",
    "Как согласовать перепланировку?",
    "Что делать при затоплении квартиры?"
  ],
  b: [
    "Какие банки могут вести спецсчета капремонта?",
    "Требования к банкам для регоператоров",
    "Какие доходы получает банк от капремонта?"
  ]
};

// ═══════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════
async function init() {
  try {
    const res = await fetch("/api/stats");
    stats = await res.json();
    
    document.getElementById("countAll").textContent = stats.total + " вопросов";
    document.getElementById("countL").textContent = stats.legal + " вопросов";
    document.getElementById("countB").textContent = stats.banking + " вопросов";
    document.getElementById("statsText").textContent = `${stats.total} вопросов • ${stats.model.split('-').slice(0,2).join(' ')}`;
    
    const dot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    if (stats.hasApiKey) {
      dot.className = "status-dot online";
      statusText.textContent = "Claude API подключён";
    } else {
      dot.className = "status-dot offline";
      statusText.textContent = "Оффлайн-режим";
    }
  } catch (e) {
    document.getElementById("statusText").textContent = "Ошибка соединения";
  }
  
  renderExamples();
}

// ═══════════════════════════════════════════════
// Mode & Examples
// ═══════════════════════════════════════════════
function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  renderExamples();
}

function renderExamples() {
  const container = document.getElementById("examples");
  if (messages.length > 0) return;
  container.innerHTML = EXAMPLES[currentMode].map(ex =>
    `<button class="example-btn" onclick="useExample(this)">→ ${ex}</button>`
  ).join("");
}

function useExample(btn) {
  document.getElementById("input").value = btn.textContent.slice(2);
  document.getElementById("input").focus();
  updateSendBtn();
}

// ═══════════════════════════════════════════════
// Chat Logic
// ═══════════════════════════════════════════════
function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function updateSendBtn() {
  const btn = document.getElementById("sendBtn");
  const val = document.getElementById("input").value.trim();
  btn.className = val && !isLoading ? "send-btn active" : "send-btn";
}

async function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = "";
  updateSendBtn();

  // Hide welcome
  const welcome = document.getElementById("welcome");
  if (welcome) welcome.style.display = "none";

  // Add user message
  messages.push({ role: "user", text });
  renderMessage("user", text);

  // Loading
  isLoading = true;
  updateSendBtn();
  const loadingEl = addLoading();

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message: text,
        mode: currentMode,
        history: messages.slice(-6)
      })
    });
    const data = await res.json();

    loadingEl.remove();
    messages.push({ role: "assistant", text: data.answer });
    renderMessage("assistant", data.answer, data.sources, data.offline);
  } catch (err) {
    loadingEl.remove();
    renderMessage("assistant", "❌ Ошибка соединения с сервером. Убедитесь, что сервер запущен.", [], false);
  }

  isLoading = false;
  updateSendBtn();
  input.focus();
}

// ═══════════════════════════════════════════════
// Rendering
// ═══════════════════════════════════════════════
function renderMessage(role, text, sources, offline) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = `msg ${role}`;

  // Simple markdown-like rendering
  let html = text
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/_(.+?)_/g, "<em>$1</em>")
    .replace(/\n\n/g, "</p><p>")
    .replace(/\n/g, "<br>");
  html = "<p>" + html + "</p>";

  let sourcesHtml = "";
  if (sources && sources.length > 0) {
    const id = "src-" + Date.now();
    sourcesHtml = `
      <div class="sources-toggle">
        <button class="sources-btn" onclick="toggleSources('${id}')">
          📎 Источники (${sources.length}) ▼
        </button>
        <div class="sources-list" id="${id}" style="display:none">
          ${sources.map(s => `
            <div class="source-item ${s.t === 'b' ? 'banking' : 'legal'}">
              <div class="source-q">${s.q}</div>
              <div class="source-r">📌 ${s.r}</div>
            </div>
          `).join("")}
        </div>
      </div>`;
  }

  let offlineHtml = "";
  if (offline) {
    offlineHtml = '<div class="offline-badge">⚡ Оффлайн-режим</div>';
  }

  div.innerHTML = `<div class="msg-bubble">${html}${sourcesHtml}${offlineHtml}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addLoading() {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg assistant";
  div.innerHTML = '<div class="loading-bubble"><span class="loading-text">Ищу в базе знаний и формирую ответ...</span></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function toggleSources(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === "none" ? "block" : "none";
}

// ═══════════════════════════════════════════════
// Questions Panel
// ═══════════════════════════════════════════════
async function togglePanel() {
  panelOpen = !panelOpen;
  document.getElementById("questionsPanel").className = panelOpen ? "questions-panel open" : "questions-panel";
  document.getElementById("overlay").className = panelOpen ? "overlay show" : "overlay";
  
  if (panelOpen) {
    try {
      const res = await fetch(`/api/questions?mode=${currentMode}`);
      const data = await res.json();
      document.getElementById("questionsList").innerHTML = data.questions.map(q => `
        <div class="q-item" onclick="askQuestion(this, '${q.q.replace(/'/g, "\\'")}')">
          ${q.q}
          <div class="q-ref">📌 ${q.r}</div>
        </div>
      `).join("");
    } catch (e) {
      document.getElementById("questionsList").innerHTML = "<p>Ошибка загрузки</p>";
    }
  }
}

function askQuestion(el, q) {
  togglePanel();
  document.getElementById("input").value = q;
  updateSendBtn();
  sendMessage();
}

// Start
init();
</script>
</body>
</html>
